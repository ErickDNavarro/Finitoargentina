<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="20%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#3a2a10" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#1A1A1A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="bg2" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#FBB03B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FBB03B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tequeno" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#FFE0A8"/>
      <stop offset="40%" stop-color="#FBB03B"/>
      <stop offset="75%" stop-color="#D8841C"/>
      <stop offset="100%" stop-color="#6E4314"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#1A1A1A"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Tequeño placeholder -->
  <g transform="translate(820 200)">
    <ellipse cx="120" cy="120" rx="180" ry="62" fill="url(#tequeno)"/>
    <ellipse cx="120" cy="120" rx="180" ry="62" fill="none" stroke="#FBB03B" stroke-width="2" opacity="0.55"/>
    <path d="M -50 110 Q 120 80 290 110" fill="none" stroke="#FFF8E1" stroke-width="2" opacity="0.45"/>
  </g>

  <!-- Texto -->
  <g transform="translate(80 220)" font-family="Montserrat, system-ui, sans-serif">
    <text x="0" y="0" font-size="28" font-weight="700" letter-spacing="4" fill="#FBB03B">FINITO ARGENTINA</text>
    <text x="0" y="80" font-size="64" font-weight="800" fill="#FFFFFF">Tequeños venezolanos</text>
    <text x="0" y="155" font-size="64" font-weight="800" fill="#FFFFFF">de verdad para tu carta.</text>
    <text x="0" y="230" font-size="28" font-weight="500" fill="#EEE2C8">Primer pedido a consignación. Sin riesgo.</text>
    <text x="0" y="270" font-size="22" font-weight="500" fill="#A8A29A">CABA + Zona Norte · Receta auténtica venezolana</text>
  </g>

  <rect x="0" y="610" width="1200" height="20" fill="#FBB03B"/>
</svg>
